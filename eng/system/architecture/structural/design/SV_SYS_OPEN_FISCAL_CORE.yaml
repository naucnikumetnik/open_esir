analysis_notes:
  consistency_checks: '- View je izveden direktno iz osam sistemskih dinamičkih scenarija i njihovih eksplicitnih use/provide port oznaka.

    - Granica ownership-a je namerno oštra: ESIR = business-facing orchestration; E-SDC = local fiscal engine + backend/audit/proof/export ownership.

    - Transport, endpoint binding, deployment node-ovi i concrete adapter attachment nisu modelovani ovde; oni pripadaju deployment, wiring i bootstrap artefaktima.

    - Dodata je posebna interfaces sekcija i za dve dependency grane koje nisu imale eksplicitno imenovane portove u svakoj sekvenci (PKI i removable media), jer bez toga structural view ostaje nedorečen.

    - Operator i provisioning trigger su spojeni u jedan stabilan akter C_OPERATOR; to uklanja scenario-specifičnu duplikaciju bez gubitka smisla.

    '
  open_issues:
  - Ako želiš strogo puristički view, možeš izbaciti candidate components iz ESIR/E-SDC i ostaviti samo komponente + portove; trenutno su tu kao most ka sledećem nivou razrade.
  - Public verification ostaje spoljašnji verifier -> public service tok; Open Fiscal Core u ovoj bazi samo emituje verification reference kroz fiskalni izlaz i zato nema zaseban runtime connector prema public verification servisu.
  - Resource budgets, konkretni error code refs i event refs nisu alocirani na ovom nivou i treba ih zaključati tek posle state/storage/deployment rada.
