      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_AUDIT_AND_PROOF_LIFECYCLE
        - S_SYS_LOCAL_AUDIT_EXPORT
        - S_SYS_FISCALIZE_INVOICE
      cm_binding_ref: ''
    - component_id: CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
      name: Status and Operator Recovery Manager
      kind: service
      responsibility: Deriviše readiness/status klasifikaciju, vodi PIN/operator recovery i osvežavanje environment konteksta.
      boundary: internal
