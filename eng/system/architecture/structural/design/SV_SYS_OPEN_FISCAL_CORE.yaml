        description: Prisustvo PKI/certificate konteksta za backend autentikaciju.
      - id: ENV_MEDIA_OPTIONAL
        description: Removable media je opciona dependency grana korišćena samo za lokalni audit export.
    observability_obligations:
      mandatory_events: []
      audit_requirements:
