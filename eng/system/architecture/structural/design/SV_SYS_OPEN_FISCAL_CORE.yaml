artifact_kind: structural_view
schema_version: '0.2'
card:
  id: SV_SYS_OPEN_FISCAL_CORE
  name: Open Fiscal Core — system structural view
  system_of_interest: Open Fiscal Core
  viewpoint_ref: VP-structural
  level: system
  scope: Sistemska strukturna dekompozicija Open Fiscal Core-a, njegovih glavnih internih komponenti, spoljnih zavisnosti, sistemskih portova i logičkih konektora.
  purpose: Da definiše stabilne sistemske granice, odgovornosti ESIR i E-SDC dela, i logičke veze prema poslovnoj aplikaciji, TaxCore servisima, Security Element-u, PKI kontekstu, javnoj verifikaciji i lokalnom audit izvozu.
traceability:
  related_stakeholder_refs: []
  related_concern_refs: []
  related_constraint_refs: []
  related_requirement_refs: []
  related_dynamic_view_refs:
  - S_SYS_OPERATE_FISCAL_CORE_MASTER
  - S_SYS_BOOTSTRAP_AND_CONFIGURATION
  - S_SYS_STATUS_AND_OPERATOR_RECOVERY
  - S_SYS_FISCALIZE_INVOICE
  - S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE
  - S_SYS_AUDIT_AND_PROOF_LIFECYCLE
  - S_SYS_LOCAL_AUDIT_EXPORT
  - S_SYS_PUBLIC_VERIFICATION
interfaces:
- id: IF_SYS_ESIR_SERVICE
  name: ESIR Service
  kind: system_internal_facade
  boundary: internal
  purpose: Poslovno-orijentisana ulazna sistemska fasada Open Fiscal Core-a prema business aplikaciji i operatoru.
  key_operations:
  - Bootstrap() -> BootstrapResult
  - CheckReady() -> ReadinessResult
  - VerifyPin(pin:PinPlainText) -> GeneralStatusCodeText
  - Fiscalize(request:InvoiceRequest) -> InvoiceResult
- id: IF_SYS_ESDC_SERVICE
  name: E-SDC Service
  kind: system_internal_service
  boundary: internal
  purpose: Sistemski interfejs kojim ESIR koristi E-SDC capabilities za lokalnu fiskalizaciju, spremnost i osvežavanje okruženja.
  key_operations:
  - BootstrapOrRefresh() -> BootstrapResult
  - CheckReady() -> ReadinessResult
  - Attention()
  - GetStatus() -> StatusResponse
  - VerifyPin(pin:PinPlainText) -> GeneralStatusCodeText
  - GetEnvironmentParameters() -> EnvironmentParametersResponse
  - CreateInvoice(request:InvoiceRequest) -> InvoiceResult
- id: IF_DEP_TAXCORE_VSDC
  name: TaxCore V-SDC
  kind: external_dependency
  boundary: external
  purpose: Spoljni V-SDC interfejs za online fiskalizaciju računa.
  key_operations:
  - CreateInvoice(request:InvoiceRequest) -> InvoiceResult
- id: IF_DEP_TAXCORE_SHARED
  name: TaxCore Shared
  kind: external_dependency
  boundary: external
  purpose: Spoljni shared TaxCore interfejs za bootstrap podatke i zajedničku konfiguraciju.
  key_operations:
  - Environments() -> EnvironmentDescriptor[]
  - Configuration() -> TaxCoreConfigurationResponse
  - TaxRates() -> TaxRatesResponse
  - EncryptionCertificate() -> EncryptionCertificateBase64
- id: IF_DEP_TAXCORE_ESDC_BACKEND
  name: TaxCore E-SDC Backend
  kind: external_dependency
  boundary: external
  purpose: Spoljni backend interfejs za autentikaciju, komande, audit i proof lifecycle.
  key_operations:
  - RequestAuthenticationToken() -> AuthenticationTokenResponse
  - NotifyOnlineStatus(body:BooleanFlagBody) -> Command[]
  - GetInitializationCommands() -> Command[]
  - NotifyCommandProcessed(commandId:string, body:BooleanFlagBody)
  - SubmitAuditPackage(data:AuditPackage) -> AuditDataStatus
  - SubmitAuditRequestPayload(data:ProofOfAuditRequest)
- id: IF_DEP_SECURE_ELEMENT
  name: Secure Element
  kind: external_dependency
  boundary: external
  purpose: Spoljni secure-element interfejs za APDU operacije nad fiskalnim tokenom i audit ciklusom.
  key_operations:
  - SignInvoiceApdu(request:SignInvoiceApduRequest) -> SignInvoiceApduResponse
  - StartAuditApdu() -> AuditRequestPayload
  - AmountStatusApdu() -> AmountStatusResponse
  - EndAuditApdu(proof:ProofOfAudit)
- id: IF_DEP_PKI_CLIENT_CONTEXT
  name: PKI Client Context
  kind: external_dependency
  boundary: external
  purpose: Spoljni PKI/certificate kontekst koji E-SDC koristi za backend autentikaciju i TLS identitet.
  key_operations:
  - ReadClientCertificateContext() -> ClientCertificateContext
- id: IF_DEP_REMOVABLE_MEDIA_IO
  name: Removable Media I/O
  kind: external_dependency
  boundary: external
  purpose: Fajl-bazirani interfejs za lokalni audit export i media-delivered commands.
  key_operations:
  - InspectRoot() -> MediaRootInspection
  - ReadCommandsFile(uid:string) -> MediaCommandFile
  - WriteCommandResults(uid:string, results:MediaCommandResults)
  - EnsureAuditFolder(uid:string)
  - WriteAuditPackage(uid:string, ordinal:number, pkg:AuditPackage)
  - WriteAuditRequestPayload(uid:string, arp:AuditRequestPayload)
- id: IF_DEP_PUBLIC_VERIFICATION
  name: Public Verification
  kind: external_dependency
  boundary: external
  purpose: Javni verifikacioni interfejs koji koristi spoljni verifier prema državnom/public verification sistemu; Open Fiscal Core samo emituje verification reference kroz fiskalni izlaz.
  key_operations:
  - GetInvoiceVerificationJson(verificationUrl:VerificationUrl) -> InvoiceVerificationResponse
components:
- id: C_OPEN_FISCAL_CORE
  name: Open Fiscal Core
  kind: component
  purpose: Sistem od interesa koji objedinjuje ESIR poslovnu fasadu i E-SDC lokalni fiskalni engine sa backend/audit lifecycle mogućnostima.
  boundary: internal
  parent_component_id: ''
  components_map:
    policy:
      intent: Na ovom nivou view-a prikazuju se samo sistemski delovi; components map služi kao most ka kasnijem component decomposition radu.
      constraints:
      - Ne uvoditi transport-specifične adaptere u ovaj view; to pripada deployment/bootstrap artefaktima.
      - Ne rastavljati E-SDC i ESIR dublje od grubih candidate components dok se ne zaključe storage/deployment/state artefakti.
      notes: Open Fiscal Core je logički sklop ESIR + E-SDC; candidate component ID-jevi koriste CC_* prefiks da se ne mešaju sa finalnim top-level C_* komponentama.
    components:
    - component_id: CC_SYS_ESIR
      name: ESIR
      kind: service
      responsibility: Business-facing fasada sistema i orkestracija poslovnih tokova.
      boundary: internal
      consumes:
        ports: []
        internal_channels: []
      provides:
        ports:
        - port_ref: P_ESIR_PROV_ESIR_SERVICE
        internal_channels: []
      depends_on_component_ids:
      - CC_SYS_ESDC
      cdd_ref: ''
      statefulness: run_scoped
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
          correlation_fields:
          - request_id
          - invoice_number
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_OPERATE_FISCAL_CORE_MASTER
        - S_SYS_FISCALIZE_INVOICE
        - S_SYS_STATUS_AND_OPERATOR_RECOVERY
      cm_binding_ref: ''
    - component_id: CC_SYS_ESDC
      name: E-SDC
      kind: service
      responsibility: Lokalni fiskalni engine i owner secure/backend/audit lifecycle tokova.
      boundary: internal
      consumes:
        ports:
        - port_ref: P_ESDC_USE_SECURE_ELEMENT
        - port_ref: P_ESDC_USE_TAXCORE_SHARED
        - port_ref: P_ESDC_USE_TAXCORE_ESDC_BACKEND
        - port_ref: P_ESDC_USE_PKI_CLIENT_CONTEXT
        - port_ref: P_ESDC_USE_REMOVABLE_MEDIA_IO
        internal_channels: []
      provides:
        ports:
        - port_ref: P_ESDC_PROV_ESDC_SERVICE
        internal_channels: []
      depends_on_component_ids: []
      cdd_ref: ''
      statefulness: persistent
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
          correlation_fields:
          - uid
          - command_id
          - audit_package_id
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_OPERATE_FISCAL_CORE_MASTER
        - S_SYS_BOOTSTRAP_AND_CONFIGURATION
        - S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE
        - S_SYS_AUDIT_AND_PROOF_LIFECYCLE
        - S_SYS_LOCAL_AUDIT_EXPORT
      cm_binding_ref: ''
  architectural_contract:
    responsibilities:
      must:
      - Da pruži jedinstvenu poslovnu ulaznu tačku za bootstrap, readiness i fiscalization tokove.
      - Da omogući lokalnu i online fiskalizaciju kroz stabilne sistemske interfejse.
      - Da očuva audit/proof lifecycle i operator-recovery tokove kao deo istog sistema.
      must_not:
      - Ne sme vezivati logičku arhitekturu za jedan deployment oblik.
      - Ne sme mešati business-facing orkestraciju i secure-element/backend ownership bez eksplicitne granice između ESIR i E-SDC.
    interaction_semantics:
      sync_mode: sync
      ordering_guarantee: per_session
      idempotency: recommended
      retry_policy_owner: ESIR za ulazne poslovne tokove; E-SDC za backend/audit tokove.
      timeout_expectations: Timeout politika je deployment-specifična i ne zatvara se na ovom view nivou.
    concurrency_model:
      execution_model: other
      reentrancy: restricted
      isolation_scope: per_request
      state_sharing_rules: Zajedničko persistent stanje je dozvoljeno samo iza E-SDC granice; ESIR ne poseduje backend/audit state ownership.
    error_model:
      emitted_errors: []
      error_translation_rules:
      - description: Spoljašnji dependency/status error-i prevode se u sistemske readiness/fiscalization ishode preko ESIR ili E-SDC fasada.
      failure_modes:
      - id: FM_SYS_BOUNDARY_DRIFT
        description: Granica između ESIR i E-SDC se razvodni i ownership postane nejasan.
        mitigation_expectation: Zadržati jedinstvenu sistemsku fasadu i eksplicitne IF_SYS / IF_DEP veze.
    configuration_surface:
      parameters: []
      environment_dependencies:
      - id: ENV_DEPLOYMENT_VARIANT
        description: Isti sistem mora biti sklopiv kao embedded, local service ili hosted-access varijanta.
    observability_obligations:
      mandatory_events: []
      audit_requirements:
      - Audit tragovi i dokazivost ne smeju zavisiti od poslovne aplikacije.
      logging_requirements:
        level: required
        correlation_fields:
        - request_id
        - invoice_number
        - uid
    decision_record_refs: []
  satisfies_concerns: []
  satisfies_constraints: []
  allocated_requirements: []
  ports: []
- id: C_ESIR
  name: ESIR
  kind: boundary
  purpose: Business-facing sistemska fasada koja prima zahteve iz poslovne aplikacije/operator toka, validira i priprema InvoiceRequest, bira fiskalizacioni put i vraća poslovni rezultat.
  boundary: internal
  parent_component_id: C_OPEN_FISCAL_CORE
  components_map:
    policy:
      intent: Prikazati samo grube candidate components koji prirodno izlaze iz sistemskih sekvenci.
      constraints:
      - Bez transport detalja.
      - Bez preuranjenog spuštanja na persistence i APDU detalje.
      notes: ESIR na ovom nivou ostaje tanka orkestraciona/business fasada sa minimalnom unutrašnjom dekompozicijom; candidate component ID-jevi su standardizovani kao CC_ESIR_*.
    components:
    - component_id: CC_ESIR_FACADE
      name: ESIR Facade
      kind: service
      responsibility: Prima Bootstrap, CheckReady, VerifyPin i Fiscalize ulaze i vodi sistemski tok prema E-SDC ili V-SDC putu.
      boundary: facade
      consumes:
        ports:
        - port_ref: P_ESIR_USE_ESDC_SERVICE
        - port_ref: P_ESIR_USE_TAXCORE_VSDC
        internal_channels: []
      provides:
        ports:
        - port_ref: P_ESIR_PROV_ESIR_SERVICE
        internal_channels: []
      depends_on_component_ids:
      - CC_ESIR_INVOICE_REQUEST_VALIDATION
      - CC_ESIR_FISCALIZATION_ROUTE_SELECTOR
      - CC_ESIR_TAXCORE_VSDC_ADAPTER
      cdd_ref: ''
      statefulness: run_scoped
      concurrency: unknown
      failure_modes:
      - id: FM_ESIR_FACADE_ROUTE_MISMATCH
        description: Pogrešan izbor V-SDC / E-SDC puta za dati deployment ili runtime režim.
        mitigation_expectation: Ruta mora biti vođena konfiguracijom i readiness stanjem, ne implicitnim heuristikama.
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
          correlation_fields:
          - request_id
          - invoice_number
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_BOOTSTRAP_AND_CONFIGURATION
        - S_SYS_STATUS_AND_OPERATOR_RECOVERY
        - S_SYS_FISCALIZE_INVOICE
      cm_binding_ref: ''
    - component_id: CC_ESIR_INVOICE_REQUEST_VALIDATION
      name: Invoice Request Validation
      kind: module
      responsibility: Radi poslovnu validaciju i pripremu InvoiceRequest strukture pre delegiranja fiskalizacionom putu.
      boundary: internal
      consumes:
        ports: []
        internal_channels: []
      provides:
        ports: []
        internal_channels: []
      depends_on_component_ids: []
      cdd_ref: ''
      statefulness: stateless
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: minimal
          correlation_fields:
          - request_id
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_FISCALIZE_INVOICE
      cm_binding_ref: ''
    - component_id: CC_ESIR_FISCALIZATION_ROUTE_SELECTOR
      name: Fiscalization Route Selector
      kind: module
      responsibility: Bira V-SDC ili E-SDC put na osnovu konfigurisanog režima, readiness konteksta i sistemske politike rutiranja.
      boundary: internal
      consumes:
        ports: []
        internal_channels: []
      provides:
        ports: []
        internal_channels: []
      depends_on_component_ids: []
      cdd_ref: ''
      statefulness: stateless
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: minimal
          correlation_fields:
          - request_id
          - configured_sdc_mode
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_FISCALIZE_INVOICE
      cm_binding_ref: ''
    - component_id: CC_ESIR_TAXCORE_VSDC_ADAPTER
      name: TaxCore V-SDC Adapter
      kind: adapter
      responsibility: Realizuje IF_DEP_TAXCORE_VSDC online invoice pozive.
      boundary: adapter
      consumes:
        ports:
        - port_ref: P_ESIR_USE_TAXCORE_VSDC
        internal_channels: []
      provides:
        ports: []
        internal_channels: []
      depends_on_component_ids: []
      cdd_ref: ''
      statefulness: shared
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
          correlation_fields:
          - request_id
          - invoice_number
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_FISCALIZE_INVOICE
      cm_binding_ref: ''
  architectural_contract:
    responsibilities:
      must:
      - Da bude jedina business-facing provider granica sistema.
      - Da validira i priprema ulazne poslovne zahteve pre delegiranja.
      - Da orkestrira readiness/recovery tokove prema E-SDC-u.
      must_not:
      - Ne sme direktno posedovati secure-element logiku.
      - Ne sme direktno posedovati backend sync, command ili audit lifecycle.
    interaction_semantics:
      sync_mode: sync
      ordering_guarantee: per_session
      idempotency: recommended
      retry_policy_owner: Pozivalac za IF_SYS_ESIR_SERVICE ulaze; E-SDC/V-SDC za njihove domenske greške.
      timeout_expectations: Ulazni pozivi moraju imati određiv timeout, ali konkretne vrednosti su deployment-specifične.
    concurrency_model:
      execution_model: other
      reentrancy: allowed
      isolation_scope: per_request
      state_sharing_rules: ESIR nema ownership nad dugotrajnim fiskalnim/audit stanjem osim kratkotrajnog request konteksta.
    error_model:
      emitted_errors: []
      error_translation_rules:
      - description: Greške V-SDC/E-SDC puta prevode se u poslovno-orijentisane fiscalization/readiness ishode.
      failure_modes:
      - id: FM_ESIR_INVALID_REQUEST
        description: Nevalidan ili nekonzistentan InvoiceRequest ulaz.
        mitigation_expectation: Zaustaviti tok pre delegiranja i vratiti validacioni ishod.
    configuration_surface:
      parameters:
      - name: configured_sdc_mode
        type_ref: SdcMode
        description: Konfigurisani fiskalizacioni put za runtime tok.
        default_policy: dynamic
      environment_dependencies: []
    observability_obligations:
      mandatory_events: []
      audit_requirements:
      - Mora postojati korelacija između poslovnog zahteva i vraćenog InvoiceResult ishoda.
      logging_requirements:
        level: required
        correlation_fields:
        - request_id
        - invoice_number
        - configured_sdc_mode
    decision_record_refs: []
  satisfies_concerns: []
  satisfies_constraints: []
  allocated_requirements: []
  ports:
  - id: P_ESIR_PROV_ESIR_SERVICE
    name: P_ESIR_PROV_ESIR_SERVICE
    type: internal
    direction: in
    role: provider
    interface_ref: IF_SYS_ESIR_SERVICE
    description: Provider port preko kog ESIR prima business-facing sistemske pozive od poslovne aplikacije i operatora.
  - id: P_ESIR_USE_ESDC_SERVICE
    name: P_ESIR_USE_ESDC_SERVICE
    type: internal
    direction: out
    role: consumer
    interface_ref: IF_SYS_ESDC_SERVICE
    description: Consumer port preko kog ESIR koristi E-SDC capabilities za lokalnu fiskalizaciju i readiness tokove.
  - id: P_ESIR_USE_TAXCORE_VSDC
    name: P_ESIR_USE_TAXCORE_VSDC
    type: external
    direction: out
    role: consumer
    interface_ref: IF_DEP_TAXCORE_VSDC
    description: Consumer port za online V-SDC CreateInvoice tok.
- id: C_ESDC
  name: E-SDC
  kind: component
  purpose: Lokalni fiskalni engine koji poseduje secure-element interakciju, backend authentication/sync, command lifecycle, audit/proof lifecycle i local audit export.
  boundary: internal
  parent_component_id: C_OPEN_FISCAL_CORE
  components_map:
    policy:
      intent: Prikazati glavne domen component kandidate koji su direktno vidljivi iz sistemskih dijagrama.
      constraints:
      - Ne zaključavati konačnu unutrašnju realizaciju pre component-level sekvenci i storage view-a.
      - Zadržati jasnu razliku između facade, adapter, store i worker odgovornosti.
      notes: E-SDC je nosilac persistent i device/backend-oriented state ownership-a; candidate component ID-jevi su standardizovani kao CC_ESDC_*.
    components:
    - component_id: CC_ESDC_FACADE
      name: E-SDC Facade
      kind: service
      responsibility: Prima sistemske pozive od ESIR-a i koordinira lokalnu fiskalizaciju, status, bootstrap i export tokove.
      boundary: facade
      consumes:
        ports:
        - port_ref: P_ESDC_USE_SECURE_ELEMENT
        - port_ref: P_ESDC_USE_TAXCORE_SHARED
        - port_ref: P_ESDC_USE_TAXCORE_ESDC_BACKEND
        - port_ref: P_ESDC_USE_PKI_CLIENT_CONTEXT
        - port_ref: P_ESDC_USE_REMOVABLE_MEDIA_IO
        internal_channels: []
      provides:
        ports:
        - port_ref: P_ESDC_PROV_ESDC_SERVICE
        internal_channels: []
      depends_on_component_ids:
      - CC_ESDC_COMMAND_LIFECYCLE_COORDINATOR
      - CC_ESDC_AUDIT_AND_PROOF_LIFECYCLE_MANAGER
      - CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
      cdd_ref: ''
      statefulness: shared
      concurrency: unknown
      failure_modes:
      - id: FM_ESDC_RUNTIME_UNAVAILABLE
        description: E-SDC lokalni runtime nije responzivan ili je blokiran spoljnim uslovom.
        mitigation_expectation: Attention/GetStatus tok mora da klasifikuje stanje i vrati operatoru smislen readiness ishod.
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
          correlation_fields:
          - uid
          - request_id
          - command_id
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_BOOTSTRAP_AND_CONFIGURATION
        - S_SYS_STATUS_AND_OPERATOR_RECOVERY
        - S_SYS_FISCALIZE_INVOICE
        - S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE
        - S_SYS_AUDIT_AND_PROOF_LIFECYCLE
        - S_SYS_LOCAL_AUDIT_EXPORT
      cm_binding_ref: ''
    - component_id: CC_ESDC_COMMAND_LIFECYCLE_COORDINATOR
      name: Command Lifecycle Coordinator
      kind: worker
      responsibility: Prima, klasifikuje, primenjuje i potvrđuje backend/media komande kroz jedinstven command lifecycle tok.
      boundary: internal
      consumes:
        ports:
        - port_ref: P_ESDC_USE_TAXCORE_ESDC_BACKEND
        - port_ref: P_ESDC_USE_REMOVABLE_MEDIA_IO
        internal_channels: []
      provides:
        ports: []
        internal_channels: []
      depends_on_component_ids: []
      cdd_ref: ''
      statefulness: shared
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
          correlation_fields:
          - command_id
          - uid
      traceability:
        requirement_refs: []
        dynamic_view_refs: []
        scenario_refs:
        - S_SYS_BOOTSTRAP_AND_CONFIGURATION
        - S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE
        - S_SYS_AUDIT_AND_PROOF_LIFECYCLE
        - S_SYS_LOCAL_AUDIT_EXPORT
      cm_binding_ref: ''
    - component_id: CC_ESDC_AUDIT_AND_PROOF_LIFECYCLE_MANAGER
      name: Audit and Proof Lifecycle Manager
      kind: service
      responsibility: Upravlja AuditPackage backlog-om, proof-of-audit ciklusom i lokalnim export setom.
      boundary: internal
      consumes:
        ports:
        - port_ref: P_ESDC_USE_SECURE_ELEMENT
        - port_ref: P_ESDC_USE_TAXCORE_ESDC_BACKEND
        - port_ref: P_ESDC_USE_REMOVABLE_MEDIA_IO
        internal_channels: []
      provides:
        ports: []
        internal_channels: []
      depends_on_component_ids: []
      cdd_ref: ''
      statefulness: persistent
      concurrency: unknown
      failure_modes: []
      configuration_surface:
        parameters: []
      observability_obligations:
        mandatory_events: []
        logging:
          level: required
