schema_version: "0.1"

purpose: >
  Stable realization anchors for linking state-machine activities
  to dynamic behavior without relying on step numbers.

rules:
  behavior_identity: "B_* remains semantic and stable."
  realization_anchor: "Use dynamic_view_ref + group_ref as the primary traceability link."
  secondary_detail: "step_refs may be added later as optional detail, never as the primary anchor."
  serving_state_focus: "Prefer bootstrap, readiness, path evaluation, recovery, and service admission groups."
  business_state_focus: "Prefer workflow, routing, success or failure finalization, proof, and export groups."
  anchor_quality: "Reference groups that are ownership-clean and semantically coherent."

example_traceability_shape:
  realization_refs:
    - dynamic_view_ref: "S_SYS_STATUS_AND_OPERATOR_RECOVERY"
      group_ref: "GRP_STATUS_EVALUATE_RECOVERY_NEEDS"
      notes: "Evaluates whether the system can admit new fiscalization work."

recommended_state_activity_anchors:
  serving:
    - dynamic_view_ref: "S_SYS_BOOTSTRAP_AND_CONFIGURATION"
      group_ref: "GRP_BOOTSTRAP_READ_SHARED_TAXCORE_DATA"
      notes: "Loads shared bootstrap inputs needed before service can become usable."
    - dynamic_view_ref: "S_SYS_BOOTSTRAP_AND_CONFIGURATION"
      group_ref: "GRP_BOOTSTRAP_PULL_INITIALIZATION_COMMANDS"
      notes: "Brings in backend-provided initialization actions during bootstrap."
    - dynamic_view_ref: "S_SYS_BOOTSTRAP_AND_CONFIGURATION"
      group_ref: "GRP_BOOTSTRAP_APPLY_AND_ACKNOWLEDGE_COMMANDS"
      notes: "Applies bootstrap-time commands that may affect readiness."
    - dynamic_view_ref: "S_SYS_BOOTSTRAP_AND_CONFIGURATION"
      group_ref: "GRP_BOOTSTRAP_PERSIST_READINESS_STATE"
      notes: "Derives and persists the resulting readiness class."
    - dynamic_view_ref: "S_SYS_STATUS_AND_OPERATOR_RECOVERY"
      group_ref: "GRP_STATUS_PROBE_ESDC_AVAILABILITY"
      notes: "Checks whether the local E-SDC path is reachable and responsive."
    - dynamic_view_ref: "S_SYS_STATUS_AND_OPERATOR_RECOVERY"
      group_ref: "GRP_STATUS_READ_CURRENT_STATUS"
      notes: "Reads current runtime status that feeds serving-state evaluation."
    - dynamic_view_ref: "S_SYS_STATUS_AND_OPERATOR_RECOVERY"
      group_ref: "GRP_STATUS_EVALUATE_RECOVERY_NEEDS"
      notes: "Classifies readiness and determines whether recovery is required."
    - dynamic_view_ref: "S_SYS_STATUS_AND_OPERATOR_RECOVERY"
      group_ref: "GRP_STATUS_RECOVER_PIN_REQUIRED_STATE"
      notes: "Represents operator-mediated recovery before service admission resumes."
    - dynamic_view_ref: "S_SYS_STATUS_AND_OPERATOR_RECOVERY"
      group_ref: "GRP_STATUS_HANDLE_TIME_OR_CERTIFICATE_DEGRADED"
      notes: "Represents degraded but explainable non-serving conditions."
    - dynamic_view_ref: "S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE"
      group_ref: "GRP_BACKEND_SYNC_ENSURE_AUTHENTICATION_CAPABILITY"
      notes: "Maintains backend access needed for ongoing alignment and command intake."
    - dynamic_view_ref: "S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE"
      group_ref: "GRP_BACKEND_SYNC_ANNOUNCE_ONLINE_STATUS"
      notes: "Publishes serviceability toward the backend."
    - dynamic_view_ref: "S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE"
      group_ref: "GRP_BACKEND_SYNC_PROCESS_STATUS_COMMANDS"
      notes: "Applies commands received during backend status publication."
    - dynamic_view_ref: "S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE"
      group_ref: "GRP_BACKEND_SYNC_PULL_INITIALIZATION_COMMANDS"
      notes: "Refreshes backend-driven command state outside bootstrap."
    - dynamic_view_ref: "S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE"
      group_ref: "GRP_BACKEND_SYNC_CLOSE_SYNC_OUTCOME"
      notes: "Collapses sync activity into a stable backend-sync state."

  business:
    - dynamic_view_ref: "S_SYS_FISCALIZE_INVOICE"
      group_ref: "GRP_FISCALIZE_VALIDATE_AND_PREPARE_REQUEST"
      notes: "Validates and prepares the invoice before path selection."
    - dynamic_view_ref: "S_SYS_FISCALIZE_INVOICE"
      group_ref: "GRP_FISCALIZE_ROUTE_ONLINE"
      notes: "Represents online fiscalization via V-SDC."
    - dynamic_view_ref: "S_SYS_FISCALIZE_INVOICE"
      group_ref: "GRP_FISCALIZE_ROUTE_LOCAL"
      notes: "Represents local fiscalization via E-SDC."
    - dynamic_view_ref: "S_SYS_FISCALIZE_INVOICE"
      group_ref: "GRP_FISCALIZE_RETURN_RESULT"
      notes: "Finalizes the request with either success or failure."

  supporting_async:
    - dynamic_view_ref: "S_SYS_AUDIT_AND_PROOF_LIFECYCLE"
      group_ref: "GRP_AUDIT_SUBMIT_PENDING_PACKAGE"
      notes: "Submits backlog audit payloads to the backend."
    - dynamic_view_ref: "S_SYS_AUDIT_AND_PROOF_LIFECYCLE"
      group_ref: "GRP_AUDIT_DETERMINE_PACKAGE_DISPOSITION"
      notes: "Determines whether the local audit package is cleared, retried, or held."
    - dynamic_view_ref: "S_SYS_AUDIT_AND_PROOF_LIFECYCLE"
      group_ref: "GRP_PROOF_SUBMIT_REQUEST"
      notes: "Starts the proof-of-audit backend request phase."
    - dynamic_view_ref: "S_SYS_AUDIT_AND_PROOF_LIFECYCLE"
      group_ref: "GRP_PROOF_COMPLETE_WITH_RETURNED_COMMAND"
      notes: "Completes proof when the backend-driven command arrives."
    - dynamic_view_ref: "S_SYS_LOCAL_AUDIT_EXPORT"
      group_ref: "GRP_LOCAL_EXPORT_DETERMINE_EXPORT_SET"
      notes: "Determines which local audit artifacts belong in the export."
    - dynamic_view_ref: "S_SYS_LOCAL_AUDIT_EXPORT"
      group_ref: "GRP_LOCAL_EXPORT_EXPORT_AUDIT_PACKAGES"
      notes: "Writes audit packages to removable media."
    - dynamic_view_ref: "S_SYS_LOCAL_AUDIT_EXPORT"
      group_ref: "GRP_LOCAL_EXPORT_EXPORT_ARP_FILE"
      notes: "Produces the ARP artifact used during local audit handling."
    - dynamic_view_ref: "S_SYS_PUBLIC_VERIFICATION"
      group_ref: "GRP_VERIFICATION_REQUEST_PUBLIC_VIEW"
      notes: "Fetches the public verification representation."
    - dynamic_view_ref: "S_SYS_PUBLIC_VERIFICATION"
      group_ref: "GRP_VERIFICATION_RETURN_VERIFIED_VIEW"
      notes: "Returns and interprets the public verification result."
