realization_constraints:
  - id: "RC_SYS_001"
    statement: "Core orchestration logic must remain separated from provider-specific transport and device protocols."
    rationale: "Preserves portability and keeps deployment-specific variation out of core runtime behavior."
    source: "architecture_policy"
    affected_subject_refs:
      - "C_ESIR"
      - "C_ESDC"
    affected_realization_refs:
      - "R_SYS_ESIR_RUNTIME"
      - "R_SYS_ESDC_RUNTIME"

  - id: "RC_SYS_002"
    statement: "Secure Element access must occur only through a dedicated adapter seam."
    rationale: "Contains device/protocol coupling and supports auditable security boundaries."
    source: "system_architecture"
    affected_subject_refs:
      - "IF_DEP_SECURE_ELEMENT"
      - "C_ESDC"
    affected_realization_refs:
      - "R_SYS_SECURE_ELEMENT_ADAPTER"
      - "R_SYS_ESDC_RUNTIME"

  - id: "RC_SYS_003"
    statement: "V-SDC protocol coupling must remain adapter-owned and must not redefine core system interfaces."
    rationale: "Allows connected-path protocol evolution and deployment rebinding without redesigning ESIR runtime logic."
    source: "system_architecture"
    affected_subject_refs:
      - "IF_DEP_TAXCORE_VSDC"
      - "C_ESIR"
    affected_realization_refs:
      - "R_SYS_TAXCORE_VSDC_ADAPTER"
      - "R_SYS_ESIR_RUNTIME"

  - id: "RC_SYS_004"
    statement: "Shared TaxCore bootstrap protocol coupling must remain adapter-owned and must not redefine core system interfaces."
    rationale: "Allows bootstrap and configuration rebinding without redesigning E-SDC runtime logic."
    source: "system_architecture"
    affected_subject_refs:
      - "IF_DEP_TAXCORE_SHARED"
      - "C_ESDC"
    affected_realization_refs:
      - "R_SYS_TAXCORE_SHARED_ADAPTER"
      - "R_SYS_ESDC_RUNTIME"

  - id: "RC_SYS_005"
    statement: "Backend protocol coupling must remain adapter-owned and must not redefine core system interfaces."
    rationale: "Allows protocol evolution and deployment rebinding without redesigning core runtime logic."
    source: "system_architecture"
    affected_subject_refs:
      - "IF_DEP_TAXCORE_ESDC_BACKEND"
      - "C_ESDC"
    affected_realization_refs:
      - "R_SYS_TAXCORE_ESDC_BACKEND_ADAPTER"
      - "R_SYS_ESDC_RUNTIME"

  - id: "RC_SYS_006"
    statement: "PKI and client-certificate source coupling must remain adapter-owned."
    rationale: "Contains certificate-store and host-context specifics without leaking them into runtime orchestration."
    source: "system_architecture"
    affected_subject_refs:
      - "IF_DEP_PKI_CLIENT_CONTEXT"
      - "C_ESDC"
    affected_realization_refs:
      - "R_SYS_PKI_CLIENT_CONTEXT_ADAPTER"
      - "R_SYS_ESDC_RUNTIME"

  - id: "RC_SYS_007"
    statement: "Local audit removable-media rules must remain outside domain orchestration logic."
    rationale: "Keeps operator/file-exchange specifics localized to adapter realization."
    source: "system_architecture"
    affected_subject_refs:
      - "IF_DEP_REMOVABLE_MEDIA_IO"
