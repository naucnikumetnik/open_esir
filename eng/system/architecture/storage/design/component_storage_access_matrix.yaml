    rationale: >
      Structural source gives it synchronous local CreateInvoice ownership and audit-trace handoff.

  - component_ref: CC_ESDC_COMMAND_LIFECYCLE_COORDINATOR
    authority_role: OW
    accesses:
      ST_SYSTEM_CONFIGURATION_STATE: "RU"
