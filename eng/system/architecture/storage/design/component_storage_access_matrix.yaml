artifact_kind: component_storage_access_matrix
schema_version: "0.1"

card:
  id: SMX_CMP_OPEN_FISCAL_CORE_STORAGE_ACCESS
  name: Open Fiscal Core — Component Storage Access Matrix
  system_of_interest: Open Fiscal Core
  viewpoint_ref: VP-storage-access
  level: component
  scope: >
    Component-level logical access matrix over already-defined system-level runtime stores.
  purpose: >
    Make read/write/append/stage access explicit per candidate component,
    while staying strictly within structural-view evidence and without
    introducing repository APIs, DB schema, or deployment-specific binding.

traceability:
  source_structural_view_ref: SV_SYS_OPEN_FISCAL_CORE
  related_storage_refs:
    - SB_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_BINDINGS
    - SR_SYS_OPEN_FISCAL_CORE_STORAGE_RULES
    - SD_CMP_OPEN_FISCAL_CORE_STORAGE_OWNERSHIP

source_policy:
  derivation_mode: structural_view_only
  rules:
    - Infer access only from explicit component responsibility, boundary, and ownership language in the structural source.
    - Do not infer transport, table, file, ORM, or repository structure.
    - If the structural source does not justify a write-capable relationship, default to read-only or no access.
    - Adapter components do not receive canonical store ownership in this artifact.

legend:
  access_symbols:
    none: "—"
    read: "R"
    create: "C"
    update: "U"
    append: "A"
    compact: "K"
    stage: "S"
  authority_symbols:
    owner_writer: OW
    support_writer: SW
    read_only_consumer: RO
    transient_only: TO
    no_persistent_access: NP

stores:
  - ST_SYSTEM_CONFIGURATION_STATE
  - ST_COUNTER_STATE
  - ST_AUDIT_EVIDENCE_STATE
  - ST_PROOF_LIFECYCLE_STATE
  - ST_COMMAND_RECOVERY_STATE
  - ST_EXPORT_STAGING_STATE

components:
  - CC_ESIR_FACADE
  - CC_ESIR_INVOICE_REQUEST_VALIDATION
  - CC_ESIR_FISCALIZATION_ROUTE_SELECTOR
  - CC_ESIR_TAXCORE_VSDC_ADAPTER
  - CC_ESDC_FACADE
  - CC_ESDC_LOCAL_FISCALIZATION_ENGINE
  - CC_ESDC_COMMAND_LIFECYCLE_COORDINATOR
  - CC_ESDC_AUDIT_AND_PROOF_LIFECYCLE_MANAGER
  - CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
  - CC_ESDC_SECURE_ELEMENT_ADAPTER
  - CC_ESDC_TAXCORE_SHARED_ADAPTER
  - CC_ESDC_TAXCORE_ESDC_BACKEND_ADAPTER
  - CC_ESDC_PKI_CLIENT_CONTEXT_ADAPTER
  - CC_ESDC_REMOVABLE_MEDIA_ADAPTER

matrix:
  - component_ref: CC_ESIR_FACADE
    authority_role: NP
    accesses:
      ST_SYSTEM_CONFIGURATION_STATE: "—"
      ST_COUNTER_STATE: "—"
      ST_AUDIT_EVIDENCE_STATE: "—"
      ST_PROOF_LIFECYCLE_STATE: "—"
      ST_COMMAND_RECOVERY_STATE: "—"
      ST_EXPORT_STAGING_STATE: "—"
    rationale: >
      ESIR is business-facing orchestration and does not own backend/audit persistent state.

  - component_ref: CC_ESIR_INVOICE_REQUEST_VALIDATION
    authority_role: TO
    accesses:
      ST_SYSTEM_CONFIGURATION_STATE: "—"
      ST_COUNTER_STATE: "—"
      ST_AUDIT_EVIDENCE_STATE: "—"
      ST_PROOF_LIFECYCLE_STATE: "—"
      ST_COMMAND_RECOVERY_STATE: "—"
      ST_EXPORT_STAGING_STATE: "—"
    rationale: >
      Validation component is pure request preparation in the structural source.

  - component_ref: CC_ESIR_FISCALIZATION_ROUTE_SELECTOR
    authority_role: TO
    accesses:
      ST_SYSTEM_CONFIGURATION_STATE: "—"
      ST_COUNTER_STATE: "—"
      ST_AUDIT_EVIDENCE_STATE: "—"
      ST_PROOF_LIFECYCLE_STATE: "—"
      ST_COMMAND_RECOVERY_STATE: "—"
      ST_EXPORT_STAGING_STATE: "—"
