      ST_AUDIT_EVIDENCE_STATE: "—"
      ST_PROOF_LIFECYCLE_STATE: "—"
      ST_COMMAND_RECOVERY_STATE: "R"
      ST_EXPORT_STAGING_STATE: "R"
