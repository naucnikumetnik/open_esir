store_summaries:
  - store_ref: ST_SYSTEM_CONFIGURATION_STATE
    writers:
      - CC_ESDC_COMMAND_LIFECYCLE_COORDINATOR
    readers:
      - CC_ESDC_FACADE
      - CC_ESDC_LOCAL_FISCALIZATION_ENGINE
      - CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
    notes:
      - Structural source does not expose a dedicated bootstrap/config manager at CMP level.

  - store_ref: ST_COUNTER_STATE
    writers:
      - CC_ESDC_LOCAL_FISCALIZATION_ENGINE
    readers:
      - CC_ESDC_LOCAL_FISCALIZATION_ENGINE
    notes:
      - Counter ownership remains provisional until lower-level dynamic views introduce a narrower counter owner.

  - store_ref: ST_AUDIT_EVIDENCE_STATE
    writers:
      - CC_ESDC_LOCAL_FISCALIZATION_ENGINE
      - CC_ESDC_AUDIT_AND_PROOF_LIFECYCLE_MANAGER
    readers:
      - CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
    notes:
      - Local fiscalization appends evidence; lifecycle manager owns backlog evolution and compaction.

  - store_ref: ST_PROOF_LIFECYCLE_STATE
    writers:
      - CC_ESDC_AUDIT_AND_PROOF_LIFECYCLE_MANAGER
    readers:
      - CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
    notes:
      - Proof ownership is clean in the structural source.

  - store_ref: ST_COMMAND_RECOVERY_STATE
    writers:
      - CC_ESDC_COMMAND_LIFECYCLE_COORDINATOR
      - CC_ESDC_STATUS_AND_OPERATOR_RECOVERY_MANAGER
    readers:
      - CC_ESDC_FACADE
    notes:
      - Command lifecycle and readiness/recovery each own distinct parts of the same logical store family.

  - store_ref: ST_EXPORT_STAGING_STATE
    writers:
      - CC_ESDC_AUDIT_AND_PROOF_LIFECYCLE_MANAGER
    readers:
      - CC_ESDC_FACADE
    notes:
      - Export ownership stays provisional until a dedicated export manager exists in structural or dynamic refinement.

constraints:
  - id: SMX_001
    statement: >
      ESIR-side candidate components do not receive direct persistent-store ownership.
    rationale: >
      Structural source explicitly reserves shared persistent state behind the E-SDC boundary.

  - id: SMX_002
    statement: >
      Adapter components do not receive canonical store ownership in this matrix.
    rationale: >
      Structural source models them as dependency seams, not lifecycle owners.

  - id: SMX_003
    statement: >
      This matrix is logical access only and does not define repositories, tables, files, or deployment bindings.
    rationale: >
      Those belong to lower implementation layers and physical storage design.

open_points:
  - subject: ST_COUNTER_STATE
    note: >
      Revisit after component-level local fiscalization dynamic view. A separate counter or continuity manager may emerge.
  - subject: ST_EXPORT_STAGING_STATE
    note: >
      Revisit after component-level local audit export dynamic view. A dedicated export manager may emerge.

analysis_notes:
  - The strongest clean structural ownership exists on the E-SDC side, not the ESIR side.
  - This artifact is intentionally conservative: where structural evidence is weak, access stays narrow.