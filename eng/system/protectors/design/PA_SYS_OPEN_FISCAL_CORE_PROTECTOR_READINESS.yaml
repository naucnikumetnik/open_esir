artifact_kind: protector_assessment
schema_version: "0.2"

card:
  id: PA_SYS_OPEN_FISCAL_CORE_PROTECTOR_READINESS
  name: Open Fiscal Core - SYS protector readiness assessment
  system_of_interest: Open Fiscal Core
  viewpoint_ref: VP-protector-assessment
  level: system
  scope: >
    Assessment of whether current SYS-level system and dependency interfaces
    need concrete C# protector wrappers before bootstrap work begins.
  purpose: >
    Make the current no-protector decision explicit, keep the reasoning traceable
    to interface Interaction control blocks, and record future promotion
    candidates sourced from state and storage invariants.
  note: >
    Protectors (P_*) are runtime boundary-policy mechanisms with internal state,
    timing, and possible side-effects. They are distinct from state-machine
    guards (G_*), which are pure boolean predicates evaluated on transitions.

traceability:
  related_structural_view_ref: SV_SYS_OPEN_FISCAL_CORE
  related_dynamic_view_refs:
    - S_SYS_BOOTSTRAP_AND_CONFIGURATION
    - S_SYS_STATUS_AND_OPERATOR_RECOVERY
    - S_SYS_FISCALIZE_INVOICE
    - S_SYS_BACKEND_SYNC_AND_COMMAND_LIFECYCLE
    - S_SYS_AUDIT_AND_PROOF_LIFECYCLE
    - S_SYS_LOCAL_AUDIT_EXPORT
  related_state_view_refs:
    - SM_SYS_ESDC_SERVING
    - SM_SYS_ESDC_BACKEND_SYNC_AND_COMMAND
    - SM_SYS_ESDC_AUDIT_AND_PROOF
    - SM_SYS_ESDC_LOCAL_AUDIT_EXPORT
  related_storage_view_refs:
    - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_AUDIT_AND_PROOF
    - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_COMMAND_RECOVERY_AND_EXPORT
    - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_CONFIG_AND_COUNTERS

assessment_policy:
  promotion_rule: Protector code may be introduced only after a non-trivial policy is promoted into the canonical interface Interaction control block.
  current_default:
    admission_policy: none
    duplicate_policy: none_or_allow
    concurrency_policy: unrestricted
    overload_policy: none
    timing_budget: none
    observability_on_trigger: none
  conclusion: No concrete protector implementation project is justified in this pass.

