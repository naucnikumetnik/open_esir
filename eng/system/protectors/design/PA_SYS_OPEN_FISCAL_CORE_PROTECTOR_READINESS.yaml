deferred_protector_candidates:
  - candidate_id: PC_SYS_PROOF_CYCLE_SINGLE_ACTIVE_UID
    policy_shape: single_active_proof_cycle_per_uid
    current_status: deferred
    source_refs:
      - SM_SYS_ESDC_AUDIT_AND_PROOF
      - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_AUDIT_AND_PROOF:E_PROOF_CYCLE_RECORD
    evidence:
      - inv.one_active_cycle_per_uid=true
    promotion_condition: Promote once the relevant interface operation gains explicit duplicate or concurrency control semantics.

  - candidate_id: PC_SYS_LOCAL_EXPORT_SINGLE_ACTIVE_SCOPE
    policy_shape: single_active_local_export_batch_per_scope
    current_status: deferred
    source_refs:
      - SM_SYS_ESDC_LOCAL_AUDIT_EXPORT
      - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_COMMAND_RECOVERY_AND_EXPORT:E_EXPORT_BATCH_RECORD
    evidence:
      - inv.scope_is_uid_and_environment_bound=true
    promotion_condition: Promote once export-trigger admission or duplicate behavior is stated in interface Interaction control.

  - candidate_id: PC_SYS_COUNTER_MONOTONIC_PERSISTENCE
    policy_shape: monotonic_counter_update
    current_status: deferred
    source_refs:
      - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_CONFIG_AND_COUNTERS:E_RECEIPT_SEQUENCE_COUNTER_STATE
      - DV_SYS_OPEN_FISCAL_CORE_RUNTIME_STORE_CONFIG_AND_COUNTERS:AP_SYNC_COUNTER_STATE_AFTER_FISCALIZATION
    evidence:
      - inv.monotonic_non_decreasing=true
      - policy.counter_monotonic=true
    promotion_condition: Promote once a runtime-store or fiscalization-facing interface declares explicit monotonic-write control.

  - candidate_id: PC_SYS_BOOTSTRAP_OR_BACKEND_SYNC_SINGLE_INFLIGHT
    policy_shape: single_inflight_cycle
    current_status: deferred
    source_refs:
      - SM_SYS_ESDC_SERVING
      - SM_SYS_ESDC_BACKEND_SYNC_AND_COMMAND
    evidence:
      - serving and backend-sync lifecycles are currently modeled as owned state machines, not interface-level control policies
    promotion_condition: Promote once bootstrap or backend-sync operations declare explicit single-flight, timing-budget, or overload semantics.
